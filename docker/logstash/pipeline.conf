input {
  http {
    port => 5044
    codec => "json"
    threads => 4
  }
}

filter {
  split {
    field => "events"
  }
  
  mutate {
    add_field => {
      "log_message" => "%{[events][message]}"
      "log_level"   => "%{[events][level]}"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "A123456a"
  }
  stdout { codec => rubydebug }
}