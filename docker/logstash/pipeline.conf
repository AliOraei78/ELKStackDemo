input {
  http {
    port => 5044
  }
}

filter {
  split {
    field => "events"
  }

  mutate {
    add_field => { "log_message" => "%{[events][message]}" }
    add_field => { "log_level" => "%{[events][level]}" }
    add_field => { "timestamp" => "%{[events][timestamp]}" }
  }

  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
  }
}